services:
  aerospike-db:
    image: aerospike/aerospike-server:8.1.1.0
    container_name: iotfleet-aerospike
    volumes:
      - ./config/aerospike.conf:/opt/aerospike/etc/aerospike.conf
    command: ["--config-file", "/opt/aerospike/etc/aerospike.conf"]
    healthcheck:
      test: ["CMD", "asinfo", "-p", "3000", "-v", "build"]
      interval: 5s
      timeout: 20s
      retries: 4
    networks:
      - iotfleet_net
    ports:
      - "3010-3012:3000-3002"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iotfleet-backend
    depends_on:
      aerospike-db:
        condition: service_healthy
    environment:
      - AEROSPIKE_HOST=aerospike-db
      - AEROSPIKE_PORT=3000
      - AEROSPIKE_NAMESPACE=iotfleet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:4000/health || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 4
    networks:
      - iotfleet_net
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iotfleet-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:4000
    networks:
      - iotfleet_net
    ports:
      - "8080:8080"

  kafka:
    image: apache/kafka:latest
    container_name: iotfleet-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: iotfleet-kafka-cluster-001
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - iotfleet_net
    ports:
      - "9094:9094"

  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: iotfleet-producer
    depends_on:
      kafka:
        condition: service_healthy
      aerospike-db:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - AEROSPIKE_HOST=aerospike-db
      - AEROSPIKE_PORT=3000
      - AEROSPIKE_NAMESPACE=iotfleet
    networks:
      - iotfleet_net
    restart: unless-stopped

  consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: iotfleet-consumer
    depends_on:
      kafka:
        condition: service_healthy
      aerospike-db:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - AEROSPIKE_HOST=aerospike-db
      - AEROSPIKE_PORT=3000
      - AEROSPIKE_NAMESPACE=iotfleet
    networks:
      - iotfleet_net
    restart: unless-stopped

  aerospike-exporter:
    image: aerospike/aerospike-prometheus-exporter:latest
    container_name: iotfleet-exporter
    depends_on:
      aerospike-db:
        condition: service_healthy
    environment:
      - AS_HOST=aerospike-db
      - AS_PORT=3000
    networks:
      - iotfleet_net
    ports:
      - "9145:9145"

  prometheus:
    image: prom/prometheus:latest
    container_name: iotfleet-prometheus
    depends_on:
      - aerospike-exporter
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - iotfleet_net
    ports:
      - "9091:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: iotfleet-grafana
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards/custom
    networks:
      - iotfleet_net
    ports:
      - "3030:3000"

networks:
  iotfleet_net:
    name: iotfleet_net

volumes:
  prometheus_data:
  grafana_data:
